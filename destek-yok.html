<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Destek Bilgisi - Unit X</title>
    <style>
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #0f172a; /* Unit X Koyu Arka Plan */
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .message { 
            font-size: 22px; 
            font-weight: bold; 
            background: #1e293b; /* Kart Rengi */
            padding: 25px 45px; 
            border-radius: 15px; 
            border: 2px solid #38bdf8; /* Unit X Mavisi Vurgu */
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.1);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="message">Destek linki bulunmamaktadır.</div>
</body>
</html>
