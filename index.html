<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donanım Rehberi</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #0f1115; color: #ffffff; }
        header { padding: 60px 20px; text-align: center; background: linear-gradient(135deg, #1e293b 0%, #0f1115 100%); border-bottom: 3px solid #3b82f6; }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: #1a1d23; border-radius: 15px; padding: 30px; border: 1px solid #374151; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #3b82f6; }
        .btn { padding: 10px 20px; background: #3b82f6; border-radius: 5px; color: white; text-decoration: none; display: inline-block; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <header><h1>Donanım Rehberi</h1></header>

    <div class="container">
        <div class="card">
            <h2>Anakartlar</h2>
            <p>Arşivdeki tüm anakartları listele.</p>
            <a href="anakartlar.html" class="btn">İncele</a>
        </div>
        <div class="card"><h2>İşlemciler</h2><p>Çok yakında...</p></div>
        <div class="card"><h2>Ekran Kartları</h2><p>Çok yakında...</p></div>
        <div class="card"><h2>PSU'lar</h2><p>Çok yakında...</p></div>
        <div class="card"><h2>RAM'ler</h2><p>Çok yakında...</p></div>
    </div>
</body>
</html>
