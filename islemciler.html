<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İşlemciler - Donanım Rehberi</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #0f1115; color: #ffffff; padding: 20px; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #3b82f6; text-decoration: none; }
        .list-container { max-width: 800px; margin: auto; }
        #searchInput { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #374151; background: #1a1d23; color: white; font-size: 16px; box-sizing: border-box; }
        #searchInput:focus { outline: 2px solid #3b82f6; }
        .item { background: #1a1d23; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #374151; transition: 0.2s; }
        .item:hover { border-color: #3b82f6; }
        a { color: white; text-decoration: none; display: block; font-weight: 500; }
        .category-title { color: #9ca3af; font-size: 14px; margin: 20px 0 10px 5px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="list-container">
        <a href="index.html" class="back-btn">← Ana Sayfaya Dön</a>
        <h1>İşlemciler (CPU)</h1>
        
        <input type="text" id="searchInput" placeholder="Marka veya model ara (Intel, AMD, Ryzen, Core)..." onkeyup="filterList()">

        <div id="processorList">
            <div class="category-title">Intel İşlemciler</div>
            <div class="item"><a href="i5-12450h.html">Intel Core i5-12450H</a></div>

            <div class="category-title">AMD İşlemciler</div>
            <div class="item"><a href="#">AMD modelleri eklenmeye devam edecek...</a></div>
        </div>
    </div>

    <script>
        function filterList() {
            let input = document.getElementById('searchInput');
            let filter = input.value.toUpperCase();
            let list = document.getElementById('processorList');
            let items = list.getElementsByClassName('item');
            
            for (let i = 0; i < items.length; i++) {
                let text = items[i].textContent || items[i].innerText;
                if (text.toUpperCase().indexOf(filter) > -1) {
                    items[i].style.display = "";
                } else {
                    items[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
